<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding Hackathon Poster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-purple: #bc13fe; --dark-bg: #0a0a0c; }
        body { background-color: var(--dark-bg); font-family: 'Space Grotesk', sans-serif; color: white; overflow-x: hidden; }
        .header-font { font-family: 'Syncopate', sans-serif; text-transform: uppercase; }
        .vibe-gradient { background: linear-gradient(135deg, #00f2ff 0%, #bc13fe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-field { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; padding: 0.75rem 1rem; width: 100%; color: white; outline: none; }
        .input-field:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        .hidden { display: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .pulse { animation: pulse 2s infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full relative">
        
        <!-- POSTER -->
        <div id="posterPage" class="glass rounded-3xl p-8 md:p-16 border-white/20 shadow-2xl relative overflow-hidden">
            <div class="text-center mb-12">
                <p class="tracking-widest text-sm text-gray-400 mb-2">DREIMS PRESENTS</p>
                <h1 class="header-font text-5xl md:text-8xl font-bold mb-4">VIBE <span class="vibe-gradient">CODING</span></h1>
                <p class="text-xl text-gray-300">HACKATHON 2026</p>
            </div>
            <div class="flex flex-col items-center gap-6">
                <button onclick="showPage('registerPage')" class="bg-white text-black px-12 py-4 rounded-full font-bold hover:scale-105 transition-all">REGISTER NOW</button>
                <p onclick="openAuthModal()" class="text-[10px] text-gray-600 cursor-pointer">Admin Dashboard</p>
            </div>
        </div>

        <!-- REGISTRATION -->
        <div id="registerPage" class="glass rounded-3xl p-8 md:p-12 hidden">
            <button onclick="showPage('posterPage')" class="text-cyan-400 mb-8 flex items-center gap-2">← Back</button>
            <h2 class="header-font text-3xl font-bold mb-6">Join the <span class="vibe-gradient">Vibe</span></h2>
            
            <form id="registrationForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="firstName" class="input-field" placeholder="First Name" required>
                    <input type="text" id="lastName" class="input-field" placeholder="Last Name" required>
                </div>
                <input type="email" id="email" class="input-field" placeholder="Email" required>
                <input type="tel" id="phone" class="input-field" placeholder="10-Digit Mobile" pattern="[0-9]{10}" required>
                <div class="grid grid-cols-2 gap-4">
                    <select id="branch" class="input-field" required>
                        <option value="" disabled selected>Branch</option>
                        <option value="CS">CS</option><option value="IT">IT</option><option value="AI&ML">AI&ML</option>
                        <option value="EXTC">EXTC</option><option value="MECH">Mechanical</option><option value="CIVIL">Civil</option>
                    </select>
                    <select id="year" class="input-field" required>
                        <option value="" disabled selected>Year</option>
                        <option value="FE">FE</option><option value="SE">SE</option><option value="TE">TE</option><option value="BE">BE</option>
                    </select>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-cyan-500 py-4 rounded-xl font-bold">SUBMIT</button>
            </form>
        </div>

        <!-- ADMIN -->
        <div id="adminPage" class="glass rounded-3xl p-8 hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="header-font text-xl font-bold">Registrations (<span id="totalCount">0</span>)</h2>
                <div class="flex gap-2">
                    <button id="exportBtn" class="bg-green-600 px-4 py-2 rounded text-xs font-bold">XLSX</button>
                    <button onclick="showPage('posterPage')" class="bg-white/10 px-4 py-2 rounded text-xs">Exit</button>
                </div>
            </div>
            <div class="overflow-x-auto max-h-96">
                <table class="w-full text-left text-sm">
                    <tbody id="studentTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="authModal" class="fixed inset-0 flex items-center justify-center bg-black/90 hidden z-50">
        <div class="glass p-8 rounded-2xl w-80 text-center">
            <h3 class="mb-4">Admin PIN</h3>
            <input type="password" id="adminPass" class="input-field text-center mb-4">
            <button onclick="verifyAdmin()" class="w-full bg-cyan-500 py-2 rounded font-bold">LOGIN</button>
            <button onclick="closeAuthModal()" class="mt-2 text-xs text-gray-500">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, Timestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'vibe-hack';
        
        // UPDATED GOOGLE SHEET URL
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbx7vCep4Cl4r9YWrpTrtUiIY3CK2xukmraOx0gdbRiwzYM-FTfe8Nt6uNa30YDyIeQyIg/exec";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let students = [];
        let userAuthenticated = false;

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth initialization failed:", error);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userAuthenticated = true;
                const registrationsRef = collection(db, 'artifacts', appId, 'public', 'data', 'registrations');
                
                onSnapshot(registrationsRef, (snap) => {
                    students = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    document.getElementById('totalCount').innerText = students.length;
                    const tbody = document.getElementById('studentTableBody');
                    if (tbody) {
                        tbody.innerHTML = students.map(s => `
                            <tr class="border-b border-white/5">
                                <td class="p-3 font-medium">${s.firstName} ${s.lastName}</td>
                                <td class="p-3 text-cyan-400">${s.branch}</td>
                                <td class="p-3 text-right"><button onclick="deleteRecord('${s.id}')" class="text-red-500 hover:text-red-400 transition-colors">×</button></td>
                            </tr>
                        `).join('');
                    }
                }, (error) => {
                    console.error("Firestore snapshot error:", error);
                });
            }
        });

        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!userAuthenticated) {
                alert("Authenticating... Please try again in a moment.");
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Processing...";

            const formData = {
                firstName: document.getElementById('firstName').value.trim(),
                lastName: document.getElementById('lastName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                branch: document.getElementById('branch').value,
                year: document.getElementById('year').value,
                timestamp: Timestamp.now()
            };

            try {
                // 1. Firebase Storage (Primary)
                const registrationsRef = collection(db, 'artifacts', appId, 'public', 'data', 'registrations');
                await addDoc(registrationsRef, formData);
                
                // 2. Google Sheets sync (Secondary)
                const sheetData = { ...formData, timestamp: formData.timestamp.toDate().toISOString() };
                fetch(GOOGLE_SHEET_URL, { 
                    method: 'POST', 
                    mode: 'no-cors',
                    body: JSON.stringify(sheetData)
                }).catch(e => console.error("Sheet sync background error:", e));

                alert("Successfully registered!");
                document.getElementById('registrationForm').reset();
                showPage('posterPage');
            } catch (err) {
                console.error("Error saving data:", err);
                alert("Error saving registration. Please try again.");
            } finally {
                btn.disabled = false;
                btn.innerText = "SUBMIT";
            }
        });

        window.showPage = (id) => {
            ['posterPage', 'registerPage', 'adminPage'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };
        window.openAuthModal = () => document.getElementById('authModal').classList.remove('hidden');
        window.closeAuthModal = () => document.getElementById('authModal').classList.add('hidden');
        window.verifyAdmin = () => { 
            if(document.getElementById('adminPass').value === "1234") {
                showPage('adminPage'); 
                closeAuthModal();
            } else {
                alert("Invalid PIN");
            }
        };
        window.deleteRecord = async (id) => { 
            if(confirm("Delete this registration?")) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'registrations', id));
                } catch (err) {
                    console.error("Delete failed:", err);
                }
            }
        };
        
        document.getElementById('exportBtn').onclick = () => {
            if (students.length === 0) return alert("No data to export");
            const dataToExport = students.map(({id, timestamp, ...rest}) => ({
                ...rest,
                Date: timestamp?.toDate ? timestamp.toDate().toLocaleString() : ''
            }));
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Students");
            XLSX.writeFile(wb, "Registrations.xlsx");
        };

        initAuth();
    </script>
</body>
</html>
